# Configuração adicional do Zabbix Server
# Este arquivo pode ser usado para customizações específicas

# Configurações de Performance
StartPollers=10
StartPollersUnreachable=3
StartTrappers=5
StartPingers=3
StartDiscoverers=3
StartHTTPPollers=2
StartIPMIPollers=0
StartVMwareCollectors=0
StartSNMPTrapper=0
StartDBSyncers=4
StartEscalators=1
StartHistoryPollers=5
StartHistorySyncers=4
StartLldManagers=2
StartLldWorkers=3
StartAlertManagers=3
StartAlerters=3
StartPreprocessors=3
StartTimers=1
StartEscalators=1
StartHousekeepers=1
StartProxyPollers=1
StartTaskManager=1
StartLLDProcessors=2
StartDataCollectors=5
StartValuePreprocessors=3
StartReportWriters=0
StartReportPreprocessors=0
StartReportSenders=0
StartServiceManagers=0
StartTriggerProcessors=5
StartTriggerWorkers=3
StartTriggerDependencies=3
StartTriggerActions=3
StartTriggerActionsWorkers=3
StartTriggerActionsWorkersMax=10
StartTriggerActionsWorkersMin=1
StartTriggerActionsWorkersIdle=1
StartTriggerActionsWorkersMaxIdle=10
StartTriggerActionsWorkersMinIdle=1
StartTriggerActionsWorkersMaxIdleTime=300
StartTriggerActionsWorkersMinIdleTime=60
StartTriggerActionsWorkersMaxIdleTime=300
StartTriggerActionsWorkersMinIdleTime=60

# Configurações de Cache
CacheSize=8M
CacheUpdateFrequency=60
CacheFreeMemory=128M
CacheFreeMemoryPercent=10

# Configurações de Timeout
Timeout=4
TrapperTimeout=300
UnreachablePeriod=45
UnavailableDelay=60
UnreachableDelay=15

# Configurações de Log
LogFile=/var/log/zabbix/zabbix_server.log
LogFileSize=0
DebugLevel=3
PidFile=/var/run/zabbix/zabbix_server.pid

# Configurações de Socket
SocketDir=/var/run/zabbix

# Configurações de Listen
ListenIP=0.0.0.0
ListenPort=10051

# Configurações de Housekeeping
HousekeepingFrequency=1
MaxHousekeepingDelay=5
HousekeepingOnStartup=1

# Configurações de SNMP
SNMPTrapperFile=/var/log/snmptrap/snmptrap.log
StartSNMPTrapper=0

# Configurações de VMware
VMwareFrequency=60
VMwarePerfFrequency=60
VMwareCacheSize=8M
VMwareTimeout=10

# Configurações de Java Gateway
JavaGateway=127.0.0.1
JavaGatewayPort=10052
StartJavaPollers=0

# Configurações de Proxy
ProxyConfigFrequency=3600
ProxyDataFrequency=1

# Configurações de SSH
SSHKeyLocation=/var/lib/zabbix/ssh_keys

# Configurações de TLS
TLSCAFile=
TLSCRLFile=
TLSCertFile=
TLSKeyFile=
TLSPSKIdentity=
TLSPSKFile=

# Configurações de Alert
AlertScriptsPath=/usr/lib/zabbix/alertscripts
ExternalScripts=/usr/lib/zabbix/externalscripts
FpingLocation=/usr/bin/fping
Fping6Location=/usr/bin/fping6

# Configurações de ODBC
LoadModulePath=/var/lib/zabbix/modules
LoadModule=

# Configurações de User Parameters
UserParameter=

# Configurações de Include
Include=/etc/zabbix/zabbix_server.conf.d/*.conf
